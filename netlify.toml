[build]
  command = "./scripts/deploy.sh"
  publish = "dist"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Configuration des fonctions programmées (scheduled functions)
[functions]
  external_node_modules = [
    "prisma", 
    "@prisma/client",
    "react",
    "react-dom", 
    "@react-email/components",
    "@react-email/render",
    "react-email",
    "@types/node",
    "typescript",
    "vite",
    "@vitejs/plugin-react",
    "tailwindcss",
    "autoprefixer",
    "postcss",
    "@tanstack/react-query",
    "chart.js",
    "react-chartjs-2",
    "lucide-react",
    "jsonwebtoken",
    "nodemailer",
    "axios",
    "date-fns",
    "zod"
  ]
  included_files = ["!node_modules/.prisma/**/*"]
  
  # Optimisation des fonctions
  [functions."*"]
    node_bundler = "esbuild"
    
  # Configuration spécifique pour reset-data
  [functions.reset-data]
    node_bundler = "esbuild"
    external_node_modules = ["@prisma/client", "prisma", "jsonwebtoken"]

# Note: Les scheduled functions peuvent être configurées via l'interface Netlify
# ou via des webhooks externes comme GitHub Actions / Zapier
# 
# Exemples de scheduling:
# - Newsletter: Tous les lundis à 9h UTC 
# - Gem Hunter: Toutes les 4 heures
# - Investor Watch: Toutes les 2 heures  
# - Monitoring: Tous les jours à minuit UTC
# - Cleanup: Tous les dimanches à 2h UTC