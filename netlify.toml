[build]
  command = "./scripts/deploy.sh"
  publish = "dist"
  environment = { NODE_VERSION = "22.17.0" }

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Configuration des fonctions programmées (scheduled functions)
[functions]
  external_node_modules = [
    "prisma", 
    "@prisma/client",
    "react",
    "react-dom", 
    "@react-email/components",
    "@react-email/render",
    "react-email",
    "@types/node",
    "typescript",
    "vite",
    "@vitejs/plugin-react",
    "tailwindcss",
    "autoprefixer",
    "postcss",
    "@tanstack/react-query",
    "chart.js",
    "react-chartjs-2",
    "lucide-react",
    "jsonwebtoken",
    "nodemailer",
    "axios",
    "date-fns",
    "zod"
  ]
  
  # Optimisation des fonctions
  [functions."*"]
    node_bundler = "esbuild"
